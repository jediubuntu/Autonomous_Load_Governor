services:
  app:
    build:
      context: ./app
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

  k6:
    image: grafana/k6:0.53.0
    profiles:
      - load
    command:
      - run
      - "--address"
      - "0.0.0.0:6565"
      - /scripts/script.js
    environment:
      TARGET_URL: http://app:8000
      INITIAL_VUS: ${ALG_INITIAL_USERS:-50}
      MAX_VUS: ${ALG_MAX_USERS:-1000}
      WORK_MS: ${WORK_MS:-20}
      FAIL_PCT: ${FAIL_PCT:-0}
      SLEEP_SECONDS: ${SLEEP_SECONDS:-1}
    volumes:
      - ./load:/scripts:ro
    ports:
      - "6565:6565"
    depends_on:
      - app

  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    profiles:
      - controller
    env_file:
      - .env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      K6_API_URL: http://k6:6565
    depends_on:
      - prometheus
      - k6
